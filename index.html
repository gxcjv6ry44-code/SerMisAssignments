<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orchard Assignments</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --line: #e3e5e8;
      --text: #1d232a;
      --muted: #68707a;
      --accent: #2d6a4f;
      --accent-soft: #eaf5ef;
      --danger: #a12626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      overflow: hidden;
    }

    .header {
      padding: 18px 20px 10px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 180px 150px;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .modal input,
    button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cfd5db;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }

    button {
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      border-color: var(--accent);
      font-weight: 600;
    }

    button:hover { filter: brightness(.96); }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: #cfd5db;
    }

    .btn-danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    .status {
      padding: 12px 20px 0;
      min-height: 32px;
      font-size: 14px;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      font-weight: 600;
    }

    .board-meta {
      padding: 6px 20px 16px;
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 0 20px 20px;
    }

    .column {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }

    .column h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 18px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--line);
    }

    .slot {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .slot:hover {
      background: #fafcfa;
    }

    .slot:last-child { border-bottom: none; }

    .slot-num {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #f1f3f5;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .slot-name.empty {
      color: #98a1aa;
      font-style: italic;
    }

    .helper {
      padding: 0 20px 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 18px 10px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .modal-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .modal-body {
      padding: 16px 18px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 0 18px 18px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .controls { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .grid,
      .controls,
      .modal-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="header">
        <h1>Orchard Assignments</h1>
        <div class="sub">Click any slot to add, change, or remove a name.</div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="serviceDate">Service Date</label>
          <input id="serviceDate" type="date" value="2026-04-22" />
        </div>

        <div class="field">
          <label for="shiftCode">Shift</label>
          <select id="shiftCode">
            <option value="PM" selected>PM</option>
            <option value="AM">AM</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="loadBtn" type="button">Load Assignments</button>
        </div>
      </div>

      <div id="status" class="status"></div>
      <div id="boardMeta" class="board-meta"></div>
      <div class="helper">Tap or click a slot to edit it.</div>

      <div class="grid">
        <div class="column">
          <h2>Check In</h2>
          <div id="check_in"></div>
        </div>
        <div class="column">
          <h2>Parking</h2>
          <div id="parking"></div>
        </div>
        <div class="column">
          <h2>Greeter</h2>
          <div id="greeter"></div>
        </div>
        <div class="column">
          <h2>Transport</h2>
          <div id="transport"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">Edit Assignment</div>
        <div id="modalSub" class="modal-sub"></div>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="nameInput">Volunteer Name</label>
          <input id="nameInput" type="text" placeholder="Enter full name" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="saveBtn" type="button">Save</button>
        <button id="clearBtn" type="button" class="btn-danger">Remove</button>
        <button id="cancelBtn" type="button" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://tfkdkekvtuqepjqsgjoc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_JRFxF6A8mDcZX2D05CdoCQ_F6_rDbwh';

    const READ_SOURCE = 'assignment_grid_rows';
    const WRITE_TABLE = 'assignments';

    const ROLE_ORDER = ['check_in', 'parking', 'greeter', 'transport'];
    const ROLE_LABELS = {
      check_in: 'Check In',
      parking: 'Parking',
      greeter: 'Greeter',
      transport: 'Transport'
    };

    const roleContainers = {
      check_in: document.getElementById('check_in'),
      parking: document.getElementById('parking'),
      greeter: document.getElementById('greeter'),
      transport: document.getElementById('transport')
    };

    const statusEl = document.getElementById('status');
    const boardMetaEl = document.getElementById('boardMeta');
    const serviceDateEl = document.getElementById('serviceDate');
    const shiftCodeEl = document.getElementById('shiftCode');
    const loadBtn = document.getElementById('loadBtn');

    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalSub = document.getElementById('modalSub');
    const nameInput = document.getElementById('nameInput');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentRows = [];
    let activeSlot = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function getBoardContext() {
      return {
        service_date: serviceDateEl.value,
        shift_code: shiftCodeEl.value
      };
    }

    function emptyBoard() {
      ROLE_ORDER.forEach(role => {
        roleContainers[role].innerHTML = '';
        for (let slot = 1; slot <= 8; slot += 1) {
          const rowEl = buildSlotElement(role, slot, null);
          roleContainers[role].appendChild(rowEl);
        }
      });
    }

    function buildSlotElement(role, slot, row) {
      const rowEl = document.createElement('div');
      rowEl.className = 'slot';

      const name = row?.full_name || 'Open';
      const isEmpty = !row;

      rowEl.innerHTML = `
        <div class="slot-num">${slot}</div>
        <div class="slot-name ${isEmpty ? 'empty' : ''}">${name}</div>
      `;

      rowEl.addEventListener('click', () => openEditor(role, slot, row));
      return rowEl;
    }

    function renderBoard(rows, serviceDate, shiftCode) {
      currentRows = rows || [];

      const byRoleAndSlot = new Map();
      currentRows.forEach(row => {
        byRoleAndSlot.set(`${row.assignment_role}:${row.assignment_slot}`, row);
      });

      ROLE_ORDER.forEach(role => {
        const container = roleContainers[role];
        container.innerHTML = '';

        for (let slot = 1; slot <= 8; slot += 1) {
          const key = `${role}:${slot}`;
          const match = byRoleAndSlot.get(key) || null;
          container.appendChild(buildSlotElement(role, slot, match));
        }
      });

      boardMetaEl.textContent = `${serviceDate} • ${shiftCode}`;
    }

    function openEditor(role, slot, row) {
      const { service_date, shift_code } = getBoardContext();

      if (!service_date) {
        setStatus('Choose a service date first.', true);
        return;
      }

      activeSlot = {
        role,
        slot,
        row
      };

      modalTitle.textContent = `${ROLE_LABELS[role]} — Slot ${slot}`;
      modalSub.textContent = `${service_date} • ${shift_code}`;
      nameInput.value = row?.full_name || '';
      modalBackdrop.classList.add('open');
      setTimeout(() => nameInput.focus(), 10);
    }

    function closeEditor() {
      modalBackdrop.classList.remove('open');
      activeSlot = null;
    }

    async function loadAssignments() {
      const { service_date, shift_code } = getBoardContext();

      if (!service_date) {
        setStatus('Choose a service date first.', true);
        return;
      }

      if (
        SUPABASE_URL === 'YOUR_SUPABASE_URL' ||
        SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY'
      ) {
        setStatus('Add your Supabase URL and anon key in the script first.', true);
        return;
      }

      setStatus('Loading...');
      boardMetaEl.textContent = '';

      try {
        const { data, error } = await client
          .from(READ_SOURCE)
          .select('assignment_id,service_date,shift_code,shift_label,assignment_role,assignment_slot,full_name,status')
          .eq('service_date', service_date)
          .eq('shift_code', shift_code)
          .order('assignment_role', { ascending: true })
          .order('assignment_slot', { ascending: true });

        if (error) throw error;

        renderBoard(data || [], service_date, shift_code);
        setStatus(`${(data || []).length} assignment row(s) loaded.`);
      } catch (err) {
        console.error(err);
        setStatus(`Load failed: ${err.message}`, true);
        emptyBoard();
      }
    }

async function saveAssignment() {
  if (!activeSlot) return;

  const fullName = nameInput.value.trim();
  const { service_date, shift_code } = getBoardContext();

  if (!fullName) {
    setStatus('Enter a name or use Remove.', true);
    return;
  }

  setStatus('Saving...');

  try {
    const { data: serviceDay, error: serviceDayError } = await client
      .from('service_days')
      .select('id')
      .eq('service_date', service_date)
      .single();

    if (serviceDayError) throw serviceDayError;

    const { data: shiftRow, error: shiftError } = await client
      .from('shifts')
      .select('id')
      .eq('code', shift_code)
      .single();

    if (shiftError) throw shiftError;

    const payload = {
      service_day_id: serviceDay.id,
      shift_id: shiftRow.id,
      full_name_snapshot: fullName,
      assignment_role: activeSlot.role,
      assignment_slot: activeSlot.slot
    };

    const { error } = await client
      .from(WRITE_TABLE)
      .upsert(payload, {
        onConflict: 'service_day_id,shift_id,assignment_role,assignment_slot'
      });

    if (error) throw error;

    closeEditor();
    await loadAssignments();
    setStatus(`Saved ${fullName}.`);
  } catch (err) {
    console.error(err);
    setStatus(`Save failed: ${err.message}`, true);
  }
}

    async function removeAssignment() {
  if (!activeSlot) return;

  const { service_date, shift_code } = getBoardContext();

  setStatus('Removing...');

  try {
    const { data: serviceDay, error: serviceDayError } = await client
      .from('service_days')
      .select('id')
      .eq('service_date', service_date)
      .single();

    if (serviceDayError) throw serviceDayError;

    const { data: shiftRow, error: shiftError } = await client
      .from('shifts')
      .select('id')
      .eq('code', shift_code)
      .single();

    if (shiftError) throw shiftError;

    const { error } = await client
      .from(WRITE_TABLE)
      .delete()
      .eq('service_day_id', serviceDay.id)
      .eq('shift_id', shiftRow.id)
      .eq('assignment_role', activeSlot.role)
      .eq('assignment_slot', activeSlot.slot);

    if (error) throw error;

    closeEditor();
    await loadAssignments();
    setStatus('Assignment removed.');
  } catch (err) {
    console.error(err);
    setStatus(`Remove failed: ${err.message}`, true);
  }
}
    loadBtn.addEventListener('click', loadAssignments);
    saveBtn.addEventListener('click', saveAssignment);
    clearBtn.addEventListener('click', removeAssignment);
    cancelBtn.addEventListener('click', closeEditor);

    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) closeEditor();
    });

    emptyBoard();
    loadAssignments();
  </script>
</body>
</html>
