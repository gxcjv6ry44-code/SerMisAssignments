<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orchard Assignments</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --line: #e3e5e8;
      --text: #1d232a;
      --muted: #68707a;
      --accent: #2d6a4f;
      --accent-soft: #eaf5ef;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      overflow: hidden;
    }

    .header {
      padding: 18px 20px 10px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 180px 130px;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cfd5db;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }

    button {
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      border-color: var(--accent);
      font-weight: 600;
    }

    button:hover {
      filter: brightness(.96);
    }

    .status {
      padding: 12px 20px 0;
      min-height: 32px;
      font-size: 14px;
      color: var(--muted);
    }

    .board-meta {
      padding: 6px 20px 16px;
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 0 20px 20px;
    }

    .column {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }

    .column h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 18px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--line);
    }

    .slot {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }

    .slot:last-child {
      border-bottom: none;
    }

    .slot-num {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #f1f3f5;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .slot-name.empty {
      color: #98a1aa;
      font-style: italic;
    }

    .error {
      color: #a12626;
      font-weight: 600;
    }

    .config {
      margin: 16px 20px 20px;
      padding: 14px;
      border: 1px dashed #cfd5db;
      border-radius: 12px;
      background: #fbfcfd;
      font-size: 14px;
    }

    .config code {
      background: #eef2f6;
      padding: 2px 6px;
      border-radius: 6px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .grid,
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="header">
        <h1>Orchard Assignments</h1>
        <div class="sub">Supabase-backed assignment board using the <strong>assignment_grid_rows</strong> view.</div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="serviceDate">Service Date</label>
          <input id="serviceDate" type="date" value="2026-04-22" />
        </div>

        <div class="field">
          <label for="shiftCode">Shift</label>
          <select id="shiftCode">
            <option value="PM" selected>PM</option>
            <option value="AM">AM</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="loadBtn" type="button">Load Assignments</button>
        </div>
      </div>

      <div id="status" class="status"></div>
      <div id="boardMeta" class="board-meta"></div>

      <div class="grid">
        <div class="column">
          <h2>Check In</h2>
          <div id="check_in"></div>
        </div>
        <div class="column">
          <h2>Parking</h2>
          <div id="parking"></div>
        </div>
        <div class="column">
          <h2>Greeter</h2>
          <div id="greeter"></div>
        </div>
        <div class="column">
          <h2>Transport</h2>
          <div id="transport"></div>
        </div>
      </div>

      <div class="config">
        Replace <code>YOUR_SUPABASE_URL</code> and <code>YOUR_SUPABASE_ANON_KEY</code> in the script before testing.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    const ROLE_ORDER = ['check_in', 'parking', 'greeter', 'transport'];

    const roleContainers = {
      check_in: document.getElementById('check_in'),
      parking: document.getElementById('parking'),
      greeter: document.getElementById('greeter'),
      transport: document.getElementById('transport')
    };

    const statusEl = document.getElementById('status');
    const boardMetaEl = document.getElementById('boardMeta');
    const serviceDateEl = document.getElementById('serviceDate');
    const shiftCodeEl = document.getElementById('shiftCode');
    const loadBtn = document.getElementById('loadBtn');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function emptyBoard() {
      ROLE_ORDER.forEach(role => {
        roleContainers[role].innerHTML = '';
        for (let slot = 1; slot <= 8; slot += 1) {
          const row = document.createElement('div');
          row.className = 'slot';
          row.innerHTML = `
            <div class="slot-num">${slot}</div>
            <div class="slot-name empty">Open</div>
          `;
          roleContainers[role].appendChild(row);
        }
      });
    }

    function renderBoard(rows, serviceDate, shiftCode) {
      emptyBoard();

      const byRoleAndSlot = new Map();
      rows.forEach(row => {
        byRoleAndSlot.set(`${row.assignment_role}:${row.assignment_slot}`, row);
      });

      ROLE_ORDER.forEach(role => {
        const container = roleContainers[role];
        container.innerHTML = '';

        for (let slot = 1; slot <= 8; slot += 1) {
          const key = `${role}:${slot}`;
          const match = byRoleAndSlot.get(key);
          const name = match?.full_name || 'Open';
          const isEmpty = !match;

          const row = document.createElement('div');
          row.className = 'slot';
          row.innerHTML = `
            <div class="slot-num">${slot}</div>
            <div class="slot-name ${isEmpty ? 'empty' : ''}">${name}</div>
          `;
          container.appendChild(row);
        }
      });

      boardMetaEl.textContent = `${serviceDate} • ${shiftCode}`;
    }

    async function loadAssignments() {
      const serviceDate = serviceDateEl.value;
      const shiftCode = shiftCodeEl.value;

      if (!serviceDate) {
        setStatus('Choose a service date first.', true);
        return;
      }

      if (
        SUPABASE_URL === 'https://tfkdkekvtuqepjqsgjoc.supabase.co' ||
        SUPABASE_ANON_KEY === 'sb_publishable_JRFxF6A8mDcZX2D05CdoCQ_F6_rDbwh'
      ) {
        setStatus('Add your Supabase URL and anon key in the script first.', true);
        return;
      }

      setStatus('Loading...');
      boardMetaEl.textContent = '';

      try {
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { data, error } = await client
          .from('assignment_grid_rows')
          .select('assignment_id,service_date,shift_code,shift_label,assignment_role,assignment_slot,full_name,status')
          .eq('service_date', serviceDate)
          .eq('shift_code', shiftCode)
          .order('assignment_role', { ascending: true })
          .order('assignment_slot', { ascending: true });

        if (error) throw error;

        renderBoard(data || [], serviceDate, shiftCode);
        setStatus(`${(data || []).length} assignment row(s) loaded.`);
      } catch (err) {
        console.error(err);
        setStatus(`Load failed: ${err.message}`, true);
        emptyBoard();
      }
    }

    loadBtn.addEventListener('click', loadAssignments);
    emptyBoard();
    loadAssignments();
  </script>
</body>
</html>
